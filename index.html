<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ŞRK-3 ULTRA</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top, #020617, #000);
    color:white;
}
header{
    text-align:center;
    padding:20px;
    font-size:28px;
    color:#00f7ff;
    text-shadow:0 0 20px #00f7ff;
}
.container{max-width:750px;margin:auto;padding:15px}
.card{
    background:rgba(255,255,255,0.06);
    padding:16px;
    border-radius:14px;
    margin:10px 0;
}
input,select,button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
}
input,select{background:#111;color:white}
button{background:linear-gradient(90deg,#00f7ff,#0066ff);font-weight:bold;cursor:pointer}
pre{white-space:pre-wrap;background:#0b0b0b;padding:14px;border-radius:10px;min-height:320px}
</style>
</head>

<body>

<header>🎵 ŞRK-3 SONG ENGINE</header>

<div class="container">

<div class="card">
<input id="inputField" placeholder="Şarkı adı">
<select id="mode">
<option value="love">💔 Aşk</option>
<option value="sad">😢 Üzüntü</option>
<option value="fun">😊 Eğlence</option>
<option value="night">🌙 Gece</option>
<option value="rap">🎤 Rap</option>
<option value="happy">🌈 Mutlu</option>
</select>
<button onclick="generate()">Üret</button>
</div>

<div class="card">
<pre id="out">Hazır...</pre>
</div>

</div>

<script>

const vocab = {
love:{
nouns:["kalp","aşk","özlem","rüya","bakış","nefes","ruh","yıldız","deniz","ışık","ten"],
verbs:["yanar","özler","bekler","arar","titrer","sarılır","akar"],
adj:["derin","romantik","sonsuz","sıcak","kırılgan"]
},

sad:{
nouns:["yağmur","yalnızlık","gölge","sessizlik","gözyaşı","sis","yankı","boşluk"],
verbs:["ağlar","susar","kaybolur","söner","üşür","kırılır"],
adj:["soğuk","karanlık","kırık","sessiz","yorgun"]
},

fun:{
nouns:["sokak","ışık","ritim","şehir","parti","dans","müzik","enerji"],
verbs:["zıplar","akar","döner","patlar","güler","coşar"],
adj:["hızlı","renkli","çılgın","canlı","enerjik"]
},

night:{
nouns:["ay","yıldız","gece","gökyüzü","sessizlik","rüya","gölge"],
verbs:["parlar","süzülür","bekler","kaybolur","akar"],
adj:["mistik","sessiz","karanlık","büyülü"]
},

rap:{
nouns:["flow","beat","mikrofon","sahne","verse","ritim"],
verbs:["akar","patlar","yükselir","vurur","hızlanır"],
adj:["sert","hızlı","güçlü","ateşli"]
},

happy:{
nouns:["umut","kahkaha","güneş","neşe","mutluluk","ışık"],
verbs:["güler","parlar","koşar","coşar","büyür"],
adj:["parlak","mutlu","neşeli","enerjik"]
}
};

function pick(a){
return a[Math.floor(Math.random()*a.length)];
}

function verse(d){
return [
pick(d.nouns)+" "+pick(d.verbs)+" bir hikaye",
pick(d.nouns)+" içinde "+pick(d.verbs),
pick(d.nouns)+" beni "+pick(d.verbs)
].join("\n");
}

function chorus(name,d){
return [
name+", "+name,
"içimde "+pick(d.nouns)+" var",
"bu dünya "+pick(d.verbs)+" ama sen yoksun"
].join("\n");
}

function verse2(d){
return [
pick(d.nouns)+" sokaklarda seni ararım",
pick(d.nouns)+" "+pick(d.verbs)+" adını taşır",
"ben "+pick(d.verbs)+" içinde kaybolurum"
].join("\n");
}

function outro(name,d){
return [
name+"...",
"her şey artık "+pick(d.adj)+" bir hikaye"
].join("\n");
}

function generate(){

let name=document.getElementById("inputField").value||"İsimsiz Şarkı";
let m=document.getElementById("mode").value;
let d=vocab[m];

let song =
`🎵 ${name} 🎵

[Verse 1]
${verse(d)}

[Chorus]
${chorus(name,d)}

[Verse 2]
${verse2(d)}

[Outro]
${outro(name,d)}
`;

document.getElementById("out").textContent=song;
}

</script>

</body>
</html>
