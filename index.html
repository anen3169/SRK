<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ŞRK-3</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top, #040817, #000);
    color:white;
}

header{
    text-align:center;
    padding:22px;
    font-size:28px;
    color:#00f7ff;
    text-shadow:0 0 25px #00f7ff;
}

.container{
    max-width:620px;
    margin:auto;
    padding:15px;
}

.card{
    background:rgba(255,255,255,0.06);
    padding:18px;
    border-radius:18px;
    margin:12px 0;
}

input,select,button{
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:12px;
    border:none;
    font-size:15px;
}

input,select{
    background:#111;
    color:white;
}

button{
    background:linear-gradient(90deg,#00f7ff,#0066ff);
    font-weight:bold;
    cursor:pointer;
}

pre{
    white-space:pre-wrap;
    background:#0b0b0b;
    padding:16px;
    border-radius:12px;
    min-height:260px;
}
</style>
</head>

<body>

<header>🤖 ŞRK-3 </header>

<div class="container">

<div class="card">

<input id="inputField" placeholder="Şarkı adı">

<select id="mode" onchange="toggleMode()">
<option value="love">💔 Aşk</option>
<option value="sad">😢 Üzüntü</option>
<option value="fun">😊 Eğlence</option>
<option value="apology">🙏 Özür</option>
</select>

<button onclick="generate()">Üret</button>

</div>

<div class="card">
<pre id="out">Hazır...</pre>
</div>

</div>

<script>

/* =========================
   📚 250+ VOCAB SYSTEM
   ========================= */

const vocab = {
    fun: {
        nouns: [
            "sokak","ışık","ritim","şehir","kalabalık","renk","gece","parti","dans","müzik",
            "DJ","beat","sahne","festival","neon","kalabalık deniz","cadde","arena","hoparlör"
        ],
        verbs: [
            "zıplar","akar","döner","patlar","güler","parlar","koşar","çalar","titreşir","coşar"
        ],
        adj: [
            "hızlı","renkli","çılgın","canlı","enerjik","parlak","ateşli","yüksek"
        ]
    },

    sad: {
        nouns: [
            "yağmur","gölge","sessizlik","kalp","oda","rüzgar","hatıra","karanlık",
            "gözyaşı","sis","yankı","boşluk","yalnızlık","kırık cam","eski şarkı"
        ],
        verbs: [
            "ağlar","söner","susar","kaybolur","üşür","dağılır","kırılır","unutur","solar"
        ],
        adj: [
            "soğuk","boş","kırık","sessiz","karanlık","yorgun","soluk","acı"
        ]
    },

    love: {
        nouns: [
            "kalp","aşk","bakış","gece","rüya","özlem","dokunuş","göz","nefes",
            "yıldız","ruh","deniz","ışık","ten","gülüş","zaman","sonsuzluk",
            "mesafe","hatıra","yemin","kalp izi","göz teması","romantik an"
        ],
        verbs: [
            "yanar","fısıldar","özler","bekler","çarpılır","arar","sarar","dokunur",
            "titrer","çağırır","bağlanır","eritir","unutamaz","hatırlar"
        ],
        adj: [
            "derin","sonsuz","sıcak","kayıp","romantik","hassas","yakıcı","unutulmaz"
        ]
    },

    apology: {
        base: [
            "seni kırdığım için gerçekten özür dilerim",
            "hatalı davrandığımı kabul ediyorum",
            "seni üzmek istemezdim",
            "pişmanım ve hatamın farkındayım"
        ],
        promise: [
            "bir daha aynı hatayı yapmamak için dikkat edeceğim",
            "seni daha iyi anlamaya çalışacağım",
            "güvenini yeniden kazanmak istiyorum",
            "bunu telafi etmek için elimden geleni yapacağım"
        ],
        soft: [
            "lütfen beni affet",
            "seni kaybetmek istemiyorum",
            "sen benim için çok değerlisin"
        ]
    }
};

/* =========================
   HELPERS
   ========================= */

function pick(a){
    return a[Math.floor(Math.random()*a.length)];
}

function line(d){
    return `${pick(d.nouns)} içinde ${pick(d.verbs)} bir ${pick(d.adj)} his`;
}

/* =========================
   UI LOGIC
   ========================= */

function toggleMode(){
    let mode = document.getElementById("mode").value;
    let input = document.getElementById("inputField");

    if(mode === "apology"){
        input.placeholder = "Kişi adı";
    } else {
        input.placeholder = "Şarkı adı";
    }
}

/* =========================
   ENGINE
   ========================= */

function apology(name){
    let d = vocab.apology;

    return `🙏 ${name} için özür mesajı 🙏

${pick(d.base)}

${pick(d.promise)}

${pick(d.soft)}`;
}

function generate(){

    let input = document.getElementById("inputField").value || "İsimsiz";
    let mode = document.getElementById("mode").value;

    let d = vocab[mode];
    let out = "";

    if(mode === "apology"){
        out = apology(input);
    } else {
        out =
`🎵 ${input} 🎵

[Verse 1]
${line(d)}
${line(d)}

[Chorus]
${input}
içimde ${pick(d.nouns)} büyüyor
bu dünya ${pick(d.verbs)} ama sen yoksun

[Verse 2]
${line(d)}
${line(d)}

[Outro]
${input}...`;
    }

    document.getElementById("out").innerText = out;
}

toggleMode();

</script>

</body>
</html>
