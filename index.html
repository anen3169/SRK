<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ŞRK-3 ULTRA</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top, #020617, #000);
    color:white;
}
header{
    text-align:center;
    padding:20px;
    font-size:28px;
    color:#00f7ff;
    text-shadow:0 0 20px #00f7ff;
}
.container{max-width:750px;margin:auto;padding:15px}
.card{
    background:rgba(255,255,255,0.06);
    padding:16px;
    border-radius:14px;
    margin:10px 0;
}
input,select,button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
}
input,select{background:#111;color:white}
button{background:linear-gradient(90deg,#00f7ff,#0066ff);font-weight:bold}
pre{white-space:pre-wrap;background:#0b0b0b;padding:14px;border-radius:10px;min-height:260px}
</style>
</head>

<body>

<header>🤖 ŞRK-3 ULTRA</header>

<div class="container">

<div class="card">
<input id="inputField" placeholder="Şarkı adı">
<select id="mode">
<option value="love">💔 Aşk</option>
<option value="sad">😢 Üzüntü</option>
<option value="fun">😊 Eğlence</option>
<option value="night">🌙 Gece</option>
<option value="rap">🎤 Rap</option>
<option value="happy">🌈 Mutlu</option>
<option value="apology">🙏 Özür</option>
</select>
<button onclick="generate()">Üret</button>
</div>

<div class="card">
<pre id="out">Hazır...</pre>
</div>

</div>

<script>

const vocab = {
love:{nouns:["kalp","aşk","özlem","rüya","bakış","nefes","ruh","yıldız","deniz","ışık","ten"],
verbs:["yanar","özler","bekler","arar","titrer","sarılır","akar"],
adj:["derin","romantik","sonsuz","sıcak","kırılgan"]},

sad:{nouns:["yağmur","yalnızlık","gölge","sessizlik","gözyaşı","sis","yankı","boşluk"],
verbs:["ağlar","susar","kaybolur","söner","üşür","kırılır"],
adj:["soğuk","karanlık","kırık","sessiz","yorgun"]},

fun:{nouns:["sokak","ışık","ritim","şehir","parti","dans","müzik","enerji"],
verbs:["zıplar","akar","döner","patlar","güler","coşar"],
adj:["hızlı","renkli","çılgın","canlı","enerjik"]},

night:{nouns:["ay","yıldız","gece","gökyüzü","sessizlik","rüya","gölge"],
verbs:["parlar","süzülür","bekler","kaybolur","akar"],
adj:["mistik","sessiz","karanlık","büyülü"]},

rap:{nouns:["flow","beat","mikrofon","sahne","verse","ritim"],
verbs:["akar","patlar","yükselir","vurur","hızlanır"],
adj:["sert","hızlı","güçlü","ateşli"]},

happy:{nouns:["umut","kahkaha","güneş","neşe","mutluluk","ışık"],
verbs:["güler","parlar","koşar","coşar","büyür"],
adj:["parlak","mutlu","neşeli","enerjik"]},

apology:{
base:["özür dilerim","pişmanım","hatalıydım","seni kırdım","üzgünüm"],
promise:["düzelteceğim","öğreneceğim","telafi edeceğim","değişeceğim"],
soft:["beni affet","lütfen","sen değerlisin","bir şans ver"]
};

function pick(a){
return a[Math.floor(Math.random()*a.length)];
}

// 🔥 KRİTİK: HER ZAMAN 10 DOLU SATIR ÜRETİR
function generate10Lines(name,d){

let lines=[];

function add(t){
if(t && t.trim()!=="") lines.push(t);
}

// 10 SATIR GARANTİ
add(`🎵 ${name} 🎵`);
add(`${pick(d.nouns||d.base)} ${pick(d.verbs||d.promise||d.verbs)} ${pick(d.adj||d.soft)}`);
add(`${pick(d.nouns||d.base)} ${pick(d.verbs||d.promise||d.verbs)} ${pick(d.adj||d.soft)}`);
add(`${pick(d.nouns||d.base)} hissediyor`);
add(name);
add(`içimde ${pick(d.nouns||d.base)} büyüyor`);
add(`bu dünya ${pick(d.verbs||d.promise||d.verbs)} ama sen yoksun`);
add(`kalbim ${pick(d.verbs||d.promise||d.verbs)}`);
add(`sessizlik ${pick(d.verbs||d.promise||d.verbs)}`);
add(`sonsuzluk ${pick(d.adj||d.soft)}`);

// kesin 10'a tamamla
while(lines.length<10){
lines.push(".");
}

return lines.slice(0,10).join("\n");
}

function generate(){

let v=document.getElementById("inputField").value||"İsimsiz";
let m=document.getElementById("mode").value;

if(m==="apology"){
let d=vocab.apology;

let lines=[];
function add(t){ if(t && t.trim()!=="") lines.push(t); }

add(`🙏 ${v} için özür`);
add(pick(d.base));
add(pick(d.promise));
add(pick(d.soft));
add("seni kırmak istemedim");
add("içimde pişmanlık büyüyor");
add("lütfen affet");
add("değişeceğim");
add("sen değerlisin");
add("bir şans ver");

document.getElementById("out").textContent=lines.slice(0,10).join("\n");
return;
}

document.getElementById("out").textContent=generate10Lines(v,vocab[m]);
}

</script>

</body>
</html>
